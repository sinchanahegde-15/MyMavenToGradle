plugins {
    id 'java'
    id 'application'
}

group = 'com.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {

    implementation 'org.seleniumhq.selenium:selenium-java:4.29.0'
    implementation 'io.github.bonigarcia:webdrivermanager:5.8.0'

    testImplementation 'junit:junit:4.13.2'
}

application {
    mainClass = 'com.example.App'
}
